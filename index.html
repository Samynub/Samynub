<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página de nuestro Podcast</title>
    <style>
       
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

    
        header {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5, #9333ea); 
            text-align: center;
            padding: 50px 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

      
        .grupo-badge {
            display: inline-block;
            background-color: #22c55e; 
            color: #0f172a;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
            font-size: 16px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        
        .contenedor-principal {
            background: #1e293b; 
            max-width: 750px;
            width: 90%;
            margin: 40px 0;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            text-align: center;
        }

        h2 {
            color: #a855f7; 
            font-size: 24px;
            margin-bottom: 25px;
        }

        .video-wrapper {
            margin-bottom: 40px;
        }

        video {
            width: 100%;
            max-width: 640px;
            border-radius: 12px;
            border: 2px solid #4f46e5; 
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.3);
        }

        
        .integrantes {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .integrantes li {
            background-color: #0f172a; 
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            text-align: center;
        }

        

        footer {
            margin-top: auto;
            padding: 25px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nuestro Podcast</h1>
        <div class="grupo-badge">Grupo: 2AMLQ</div>
    </header>

    <div class="contenedor-principal">
        
        <h2>Mira nuestro último episodio</h2>
        <div class="video">
            <video controls>
                <source src="boyfriend.mp4" type="video/mp4">
                Tu navegador no soporta el formato de video.
            </video>
        </div>

        <h2>Integrantes del Equipo</h2>
        <ul class="integrantes">
            <li>Alcantarilla Roque Tania</li>
            <li>Arce Cruz Johanna Denise</li>
            <li>Manzano Pérez Sandra</li>
            <li>Roquillo Sánchez Anel Vanessa</li>
        </ul>

    </div>

   

</body>
</html>
